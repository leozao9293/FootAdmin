<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootManAdmin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar">
        <h2>FootManAdmin</h2>
        <div class="sub">Premier League Modular</div>
        
        <button class="menu-btn active" onclick="mudarTela('elenco', this)">📋 Elenco</button>
        <button class="menu-btn" onclick="mudarTela('tactics', this)">📐 Táticas</button>
        <button class="menu-btn" onclick="mudarTela('classificacao', this)">🏆 Campeonato</button>
        <button class="menu-btn" onclick="mudarTela('proximo-jogo', this)">⚽ Próximo Jogo</button>
    </div>

    <div class="main-content">
        
        <div class="header-status">
            <div class="status-item">
                <span>Seu Clube</span>
                <strong id="meu-time-nome" style="color: var(--accent-neon);">Carregando...</strong>
            </div>
            <div class="status-item">
                <span>Orçamento</span>
                <strong id="financas-txt" style="color: #4caf50;">£ 0</strong>
            </div>
        </div>

        <div id="tela-elenco" class="screen active">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Gestão do Elenco (Atributos Importados)</h2>
                <div>
                    <label>Trocar de Time: </label>
                    <select id="select-time-usuario" onchange="trocarTimeUsuario(this.value)"></select>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Posição</th>
                        <th>Nome</th>
                        <th>Idade</th>
                        <th>OVR</th>
                        <th>Atributos Detalhados</th>
                    </tr>
                </thead>
                <tbody id="tabela-jogadores"></tbody>
            </table>
        </div>

        <div id="tela-tactics" class="screen">
            <h2>Quadro Tático Interativo</h2>
            <div class="campo-container">
                <div class="campo-futebol" id="campo-futebol">
                    <div class="linha-meio"></div>
                    <div class="circulo-central"></div>
                </div>
                <div class="instrucoes-taticas">
                    <h3>Estratégia</h3>
                    <p>Mova as peças. Dados importados com sucesso via JSON.</p>
                </div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
